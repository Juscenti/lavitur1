<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lavitúr – Contact</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
<script>
  fetch('_partials/navbar.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('navbar-placeholder').innerHTML = data;
      const script = document.createElement('script');
      script.src = 'js/navbar.js';
      document.body.appendChild(script);
    });
</script>


  <!-- Contact Form -->
  <section class="container">
    <h2>Get in Touch</h2>
    <form style="max-width:600px; margin:auto; display:flex; flex-direction:column; gap:1rem;">
      <input type="text" placeholder="Your Name" required style="padding:0.75rem; border:1px solid #ccc;">
      <input type="email" placeholder="Your Email" required style="padding:0.75rem; border:1px solid #ccc;">
      <textarea placeholder="Your Message" rows="6" style="padding:0.75rem; border:1px solid #ccc;"></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Facebook</a>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
